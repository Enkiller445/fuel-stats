name: Collect fuel stats

# Собирает данные и публикует дашборд 2 раза в день.
# Время в cron — UTC. МСК = UTC+3, поэтому 06:00 UTC = 09:00 МСК, 18:00 UTC = 21:00 МСК.
on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}   # кнопка "Run workflow" для проверки вручную

permissions:
  contents: write          # чтобы дописывать историю и index.html обратно в репозиторий

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect + build dashboard
        run: python run.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data index.html
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита."
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
