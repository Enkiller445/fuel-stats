name: Collect fuel stats

# Собирает данные и публикует дашборд ЕЖЕЧАСНО (в начале каждого часа UTC).
# Репозиторий публичный → минуты GitHub Actions не тарифицируются.
on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}     # кнопка "Run workflow" для ручной проверки

permissions:
  contents: write           # дописывать историю обратно в репозиторий
  pages: write              # публиковать дашборд
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect + build dashboard
        run: python run.py

      - name: Commit history (only small text files)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv data/status.json
          if git diff --cached --quiet; then
            echo "Нет изменений истории."
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
